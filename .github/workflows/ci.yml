name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci_dummy_secret_not_used_at_runtime
      GOOGLE_CLIENT_ID: ci_dummy
      GOOGLE_CLIENT_SECRET: ci_dummy
      GEMINI_API_KEY: ci_dummy
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy
      SUPABASE_SERVICE_ROLE_KEY: ci_dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
